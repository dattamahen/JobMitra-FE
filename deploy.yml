# GitHub Actions deployment workflow
name: Deploy JobMitra Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      
    - name: Run tests
      run: npm test -- --watch=false --browsers=ChromeHeadless
    
    # Add your deployment steps here (AWS, Vercel, Netlify, etc.)
