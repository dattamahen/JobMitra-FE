<div class="dashboard-layout">
	<app-side-nav (pageSelected)="onPageSelected($event)"></app-side-nav>

	<div class="main-content">
		<div class="page-content">
			@if (isPageLoading()) {
				<app-loading
					[title]="loadingConfigs[currentPage()]?.title || 'Loading...'"
					[message]="loadingConfigs[currentPage()]?.message || 'Please wait'"
					[icon]="loadingConfigs[currentPage()]?.icon || 'hourglass_empty'">
				</app-loading>
			} @else if (currentComponent()) {
				<ng-container
					[ngComponentOutlet]="currentComponent()!"
					[ngComponentOutletInputs]="pageInputs" />
			}
		</div>
	</div>
</div>
