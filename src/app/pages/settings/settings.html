<div class="page-container">
	<div class="content">
		<div class="settings-sections">
			<div class="setting-group">
				<h2>{{TEXT.general.title}}</h2>
				<div class="setting-item">
					<label>{{TEXT.general.theme}}</label>
					<select>
						<option>{{TEXT.general.themeOptions.light}}</option>
						<option>{{TEXT.general.themeOptions.dark}}</option>
					</select>
				</div>
				<div class="setting-item">
					<label>{{TEXT.general.language}}</label>
					<select>
						<option>{{TEXT.general.languageOptions.english}}</option>
						<option>{{TEXT.general.languageOptions.spanish}}</option>
						<option>{{TEXT.general.languageOptions.french}}</option>
					</select>
				</div>
			</div>
			<div class="setting-group">
				<h2>{{TEXT.notifications.title}}</h2>
				<div class="setting-item">
					<label>
						<input type="checkbox" checked> {{TEXT.notifications.email}}
					</label>
				</div>
				<div class="setting-item">
					<label>
						<input type="checkbox"> {{TEXT.notifications.push}}
					</label>
				</div>
			</div>
		</div>
	</div>
</div>
