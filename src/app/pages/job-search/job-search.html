<div class="page-container">
	<!-- Job Filter -->
	<app-job-filter
		[filterConfig]="filterConfig()"
		[filterOptions]="filterOptions"
		[resultsCount]="filteredJobListings().length"
		(filterChange)="onFilterChange($event)">
	</app-job-filter>

	<div class="job-listings">
		@if (isLoading) {
			<app-loading 
				[title]="TEXT.loading.title"
				[message]="TEXT.loading.message"
				[icon]="TEXT.loading.icon">
			</app-loading>
		} @else if (filteredJobListings().length === 0) {
			<mat-card>
				<app-empty-state
					[icon]="TEXT.emptyState.icon"
					[title]="TEXT.emptyState.title"
					[message]="TEXT.emptyState.message"
					[actionLabel]="TEXT.emptyState.actionLabel"
					[actionRoute]="TEXT.emptyState.actionRoute">
				</app-empty-state>
			</mat-card>
		} @else {
			@for (job of paginatedJobs(); track job.job_id) {
				<app-job-card
					[job]="job"
					[isMatchAnalysisDisabled]="isMatchAnalysisDisabled(job.job_id)"
					[isTailorResumeDisabled]="isTailorResumeDisabled(job.job_id)"
					[matchAnalysisText]="getMatchAnalysisText(job.job_id)"
					[tailorResumeText]="getTailorResumeText(job.job_id)"
					(matchAnalysisClick)="takeMatchAnalysis($event)"
					(tailorResumeClick)="modifyCV($event)"
					(mockInterviewClick)="takeMockInterview($event)"
					(applyClick)="applyForJob($event)">
				</app-job-card>
			}

		<!-- Pagination -->
		@if (totalPages() > 1) {
			<div class="pagination">
				<button mat-icon-button [disabled]="currentPage() === 1" (click)="goToPage(currentPage() - 1)">
					<mat-icon>chevron_left</mat-icon>
				</button>
				<span class="page-info">Page {{currentPage()}} of {{totalPages()}} ({{filteredJobListings().length}} jobs)</span>
				<button mat-icon-button [disabled]="currentPage() === totalPages()" (click)="goToPage(currentPage() + 1)">
					<mat-icon>chevron_right</mat-icon>
				</button>
			</div>
		}
		}
	</div>
</div>
