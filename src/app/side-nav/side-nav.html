<nav class="side-nav-container">
	<div class="app-header">
		<img src="favicon.svg" alt="JobMitra logo" class="app-logo-img" width="48" height="48">
		<h1 class="app-name">JobMitra</h1>
	</div>
	<mat-nav-list class="nav-menu-scrollable">
		@for (item of navItems; track item.id) {
			<mat-list-item 
				[class.active]="activeItem === item.id"
				(click)="selectItem(item.id)"
				class="nav-item"
				style="height:2.5rem !important">
				<mat-icon matListItemIcon class="nav-icon">{{ item.matIcon }}</mat-icon>
				<span matListItemTitle>{{ item.label }}</span>
			</mat-list-item>
		}
	</mat-nav-list>
	
	<div class="app-footer">
		<div class="user-info">
			<mat-icon class="user-avatar">account_circle</mat-icon>
			<div class="user-details">
				<span class="user-name">{{ userName }}</span>
				<span class="user-email">{{ userEmail }}</span>
			</div>
		</div>
		<mat-list-item 
			(click)="logout()"
			class="nav-item logout-item">
			<mat-icon matListItemIcon class="nav-icon">logout</mat-icon>
			<span matListItemTitle>Logout</span>
		</mat-list-item>
	</div>
</nav>
