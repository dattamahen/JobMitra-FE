<nav class="side-nav-container">
	<div class="app-header">
		<img src="favicon.svg" [alt]="TEXT.logoAlt" class="app-logo-img" width="48" height="48">
		<h1 class="app-name">{{TEXT.appName}}</h1>
	</div>
	<mat-nav-list class="nav-menu-scrollable">
		@for (item of navItems(); track item.id) {
			<mat-list-item 
				[class.active]="activeItem() === item.id"
				(click)="selectItem(item.id)"
				class="nav-item">
				<mat-icon matListItemIcon class="nav-icon">{{ item.matIcon }}</mat-icon>
				<span matListItemTitle>{{ item.label }}</span>
			</mat-list-item>
		}
	</mat-nav-list>
	
	<div class="app-footer">
		<div class="user-info">
			<mat-icon class="user-avatar">account_circle</mat-icon>
			<div class="user-details">
				<span class="user-name">{{ userName() }}</span>
				<span class="user-email">{{ userEmail() }}</span>
			</div>
			<button class="logout-btn" (click)="logout()" [attr.aria-label]="TEXT.logout" title="Logout">
				<mat-icon>logout</mat-icon>
			</button>
		</div>
	</div>
</nav>
