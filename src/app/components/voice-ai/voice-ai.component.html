<div class="voice-ai-container">
			<mat-card class="voice-card">
				<mat-card-header>
					<mat-card-title class="title">
						<mat-icon class="title-icon">mic</mat-icon>
						{{TEXT.title}}
					</mat-card-title>
					<mat-card-subtitle>{{TEXT.subtitle}}</mat-card-subtitle>
				</mat-card-header>

				<mat-card-content>
					<div class="mic-section">
						<button 
							mat-fab 
							[class.listening]="voiceService.isListening()"
							[class.processing]="voiceService.isProcessing()"
							[disabled]="voiceService.isProcessing()"
							(click)="toggleListening()"
							class="mic-button">
							@if (voiceService.isProcessing()) {
								<mat-spinner diameter="24"></mat-spinner>
							} @else {
								<mat-icon>{{micIcon()}}</mat-icon>
							}
						</button>
						<p class="mic-status">{{statusText()}}</p>
					</div>

					<div class="input-section">
						<h4>{{TEXT.yourQuery}}</h4>
						<div class="input-display">
							{{voiceService.currentTranscript() || TEXT.speakPrompt}}
						</div>
					</div>

					<div class="response-section">
						<h4>{{TEXT.aiResponse}}</h4>
						<div class="response-display">
							{{voiceService.currentResponse() || TEXT.waitingForInput}}
						</div>
					</div>
				</mat-card-content>
			</mat-card>
		</div>
