<div class="voice-ai-container">
  <div class="voice-card">
    <div class="header">
      <div class="title">
        <mat-icon class="title-icon">mic</mat-icon>
        Voice AI Assistant
      </div>
      <p class="subtitle">Speak your question, and let the AI answer and talk back!</p>
    </div>

    <div class="content">
      <!-- Microphone Button -->
      <div class="mic-section">
        <button 
          mat-fab 
          [class.listening]="voiceService.isListening()"
          [class.processing]="voiceService.isProcessing()"
          [disabled]="voiceService.isProcessing()"
          (click)="toggleListening()"
          class="mic-button">
          @if (voiceService.isProcessing()) {
            <mat-spinner diameter="24"></mat-spinner>
          } @else {
            <mat-icon>{{micIcon()}}</mat-icon>
          }
        </button>
        <p class="mic-status">{{statusText()}}</p>
      </div>

      <!-- User Input Display -->
      <div class="input-section">
        <h4>Your Query:</h4>
        <div class="input-display">
          {{voiceService.currentTranscript() || '(Speak into the microphone to start...)'}}
        </div>
      </div>

      <!-- AI Response Display -->
      <div class="response-section">
        <h4>AI Response:</h4>
        <div class="response-display">
          {{voiceService.currentResponse() || 'Waiting for input...'}}
        </div>
      </div>
    </div>

    <div class="actions">
      <button mat-button (click)="closeModal()">Close</button>
    </div>
  </div>
</div>
